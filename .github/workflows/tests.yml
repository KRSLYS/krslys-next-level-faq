name: Tests

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master, develop]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # PHPUnit — fast, no DB, no WordPress needed
  # ──────────────────────────────────────────────
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPUnit
        run: vendor/bin/phpunit --no-coverage

  # ──────────────────────────────────────────────
  # Playwright E2E — real browser, real WordPress
  # ──────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: phpunit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, mysqli
          coverage: none

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend assets
        run: npm run build

      - name: Start WordPress environment (wp-env)
        run: |
          npm -g install @wordpress/env
          wp-env start

      - name: Activate plugin & verify
        run: |
          wp-env run cli wp plugin list
          wp-env run cli wp plugin activate krslys-next-level-faq || true
          wp-env run cli wp plugin list --status=active

      - name: Create .env for Playwright
        run: |
          echo "WP_BASE_URL=http://localhost:8889" > .env
          echo "WP_ADMIN_USER=admin" >> .env
          echo "WP_ADMIN_PASS=password" >> .env

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
