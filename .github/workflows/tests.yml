name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [ '7.4', '8.0', '8.1', '8.2', '8.3' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer, wp-cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci

      - name: Build assets
        run: npm run build

      - name: Install WordPress
        run: |
          wp core download --path=wordpress
          wp config create --path=wordpress --dbname=wordpress --dbuser=root --dbpass=root --dbhost=127.0.0.1
          wp core install --path=wordpress --url=http://localhost:8080 --title=Test --admin_user=admin --admin_password=password --admin_email=test@example.com --skip-email

      - name: Activate plugin
        run: |
          ln -s "$GITHUB_WORKSPACE" wordpress/wp-content/plugins/krslys-next-level-faq-accordion
          wp plugin activate krslys-next-level-faq-accordion --path=wordpress

      - name: Start WordPress server
        run: |
          cd wordpress
          wp server --host=0.0.0.0 --port=8080 &
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          WP_BASE_URL: http://localhost:8080
          WP_PATH: wordpress
